<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Student Registration Website</title>
        <meta name="description" content="A Student registeration website that is used to keep track of registered students and lets you register students">
    </head>
    <body>
        <header>
            <h1>Student Registeration</h1>
            <nav>
            <a href="./index.html">home</a>| <a href="./register.html">Register Student</a>| <a href="./records.html">Student Record</a>
            </nav>
        </header>
      <main>
        <form >
        <fieldset id="personal-info">
            <legend>Personal Information</legend>
            <label for="first-name">First Name:<span aria-hidden="true">*</span></label>
            <input required type="text" id="first-name" name="first-name" placeholder="e.g, Ali">
            <br>
            <label for="last-name">Last Name:<span aria-hidden="true">*</span></label>
            <input required type="text" id="lastt-name" name="last-name" placeholder="e.g, Akbar">
            <br>
            <label for="father-name">Father Name:</label>
            <input required type="text" id="father-name" name="father-name" >
            <br>
            <label for="cnic">Your CNIC:<span aria-hidden="*">*</span></label>
            <input required type="text" id="cnic" name="cnic" placeholder="xxxxx-xxxxxxx-x">
        </fieldset>
        <fieldset id="contact">
            <legend>Contact Information</legend>
            <label for="phone">Phone Number:<span aria-hidden="*">*</span></label>
            <input required id="phone" name="phone" type="text" placeholder="xxxx-xxxxxxx">
            <br>
            <label for="mail">Email:<span aria-hidden="*">*</span></label>
            <input required type="email" id="mail" name="mail" placeholder="example@email.com">
            <br>
        </fieldset>
        <fieldset id="age">
            <legend>Age</legend>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="16" max="28">
            <br>
        </fieldset>
        <fieldset id="gender">
            <legend>Gender:*</legend>
            <input required type="radio" id="gender-male" name="gender">
            <label for="gender-male">male </label>
            <input required type="radio" id="gender-female" name="gender">
            <label for="gender-female">female </label>
            <input required type="radio" id="gender-nosay" name="gender">
            <label for="gender-nosay">prefer not say </label>
            <br>
        </fieldset>
        <fieldset id="Uni-info">
            <legend >University Information</legend>
            <label for="Semester">Semester:</label>
            <select required id="Semester" name="Semester">
                <option value="sem-1">1</option>
                <option value="sem-2">2</option>
                <option value="sem-3">3</option>
                <option value="sem-4">4</option>
                <option value="sem-5">5</option>
                <option value="sem-6">6</option>
                <option value="sem-7">7</option>
                <option value="sem-8">8</option>
            </select>
           
            <label for="department">     Department:</label>
            <select required id="department" name="department">
                <option value="Software-engineering">Software Engineering</option>
                <option value="Computer-Science">Computer Science</option>
                <option value="Information-technology">Information Technology</option>
                <option value="data-science">Data Science</option>
                <option value="Artificial-intelligence">Artificial Intelligence</option>
            </select>
        </fieldset>
        <fieldset id="address">
            <legend>Address</legend>
            <label for="city">City:</label>
            <input id="city" name="city" type="text">
            <br>
            <label for="province">Province:</label>
            <select id="province" name="province">
                <option value="punjab">Punjab</option>
                <option value="sindh">Sindh</option>
                <option value="kpk">KPK</option>
                <option value="gilgit">Gilgit Baltistan</option>
                <option value="azad-kashmir">Azad Kashmir</option>
                <option value="balochistan">Balochistan</option>
            </select>
        </fieldset>
        <fieldset id="additional-comment">
            <legend>Additional Information (If Any)</legend>
            <textarea>Type any additional information here!</textarea>
        </fieldset>
        <button type="submit">Submit</button>
        </form>
      </main>  
    </body>
</html>
